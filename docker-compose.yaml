x-backend-template: &backend_base
  build:
    context: .
    target: normal
  env_file: .env.dev
  environment:
    DATABASE_DSN: postgres://user:password@postgres:5432/intania-openhouse-2026?sslmode=disable
  ports:
    - "8000:8000"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - intania-openhouse-2026-network

services:
  postgres:
    image: postgres:16
    container_name: intania-openhouse-2026-db
    env_file: .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-intania-openhouse-2026}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-intania-openhouse-2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - intania-openhouse-2026-network

  backend:
    <<: *backend_base
    container_name: intania-openhouse-2026-backend

  backend-testing:
    <<: *backend_base
    container_name: intania-openhouse-2026-backend-testing
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 500M

volumes:
  postgres_data:

networks:
  intania-openhouse-2026-network:
    driver: bridge
